<h2 mat-dialog-title>Add New Course</h2>
<mat-dialog-content [formGroup]="courseForm">
    <mat-form-field appearance="fill" class="w-100">
        <mat-label>ID</mat-label>
        <input matInput formControlName="crsId">
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-100">
        <mat-label>Name</mat-label>
        <input matInput formControlName="crsName">
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-100">
        <mat-label>Duration</mat-label>
        <input matInput formControlName="crsDuration">
    </mat-form-field>
    <mat-form-field>
        <mat-label>Select</mat-label>
        <mat-select formControlName="deptId">
            @for(dept of (depts$ | async) ?? []; track dept.deptId) {
                <mat-option [value]="dept.deptId">{{dept.deptName}}</mat-option>
            }
        </mat-select>
    </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()">Cancel</button>
    <button matButton="filled" color="primary" (click)="onSubmit()">Save</button>
</mat-dialog-actions>
