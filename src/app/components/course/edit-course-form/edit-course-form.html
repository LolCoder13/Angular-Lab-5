<h2 mat-dialog-title>Edit Course {{data.crsName}} with Id {{data.crsId}}</h2>
<mat-dialog-content [formGroup]="courseForm">
    <mat-form-field appearance="fill" class="w-100">
        <mat-label>Name</mat-label>
        <input matInput formControlName="crsName">
        <mat-error *ngIf="courseForm.get('crsName')?.hasError('required')">
            Name is <strong>required</strong>
        </mat-error>
    </mat-form-field>
    <mat-form-field appearance="fill" class="w-100">
        <mat-label>Duration</mat-label>
        <input matInput formControlName="crsDuration">
        <mat-error *ngIf="courseForm.get('crsDuration')?.hasError('required')">
            Duration is <strong>required</strong>
        </mat-error>
    </mat-form-field>
    <mat-form-field>
        <mat-label>Select</mat-label>
        <mat-select formControlName="deptId" [value]="data.deptId">
            @for(dept of depts; track $index) {
                <mat-option [value]="dept.deptId">{{dept.deptName}}</mat-option>
            }
        </mat-select>
    </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="dialogRef.close()">Cancel</button>
    <button matButton="filled" color="primary" (click)="onSubmit()" [disabled]="!courseForm.valid">Save</button>
</mat-dialog-actions>
